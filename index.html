<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國語找字遊戲 v4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap');

        :root {
            --bg-base: #F4F1ED; 
            --bg-pattern: #EBE6DF; 
            --text-main: #696561; 
            --text-light: #9B9895; 
            --panel-bg: #FFFFFF;
            --panel-border: #D8D2CB; 
            --grid-border: #BDB5AD; 
            --cell-bg: #FCFBF9;
            --cell-border: #E8E4DF;
            --cell-hover: #F0EBE5;
            --cell-selected-bg: #C1C9C8; 
            --cell-selected-border: #9BA6A5;
            --cell-selected-text: #4A5554;
            --cell-found-bg: #D4A373; 
            --cell-found-border: #BC8A59;
            --cell-found-text: #FFFFFF;
            --btn-blue: #A8B8C2; 
            --btn-blue-hover: #8A9CA8;
            --btn-purple: #C2B8CC; 
            --btn-purple-hover: #A69AB2;
            --btn-green: #B5C4B1; 
            --btn-green-hover: #98A994;
            --btn-orange: #D4BBA5; 
            --btn-orange-hover: #BCA089;
            --lobby-btn-bg: #F8F6F4;
            --lobby-btn-border: #D4CFC9;
            --lobby-btn-hover: #E2DDD6;
        }

        body {
            font-family: 'Zen Maru Gothic', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(var(--bg-pattern) 20%, transparent 20%), 
                radial-gradient(var(--bg-pattern) 20%, transparent 20%);
            background-position: 0 0, 40px 40px;
            background-size: 80px 80px;
            overflow-x: hidden;
            touch-action: manipulation;
            user-select: none;
            color: var(--text-main);
            height: 100dvh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
        }

        .footer-version { position: fixed; bottom: 10px; right: 15px; font-size: 0.85rem; color: var(--text-light); z-index: 9999; pointer-events: none; font-weight: bold; }

        #lobby-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .lobby-panel { background: var(--panel-bg); padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(105, 101, 97, 0.08); max-width: 800px; width: 100%; text-align: center; border-top: 8px solid var(--grid-border); }
        .lesson-btn { background: var(--lobby-btn-bg); color: var(--text-main); border: 3px solid var(--lobby-btn-border); border-radius: 20px; padding: 20px; font-size: 1.25rem; font-weight: bold; transition: all 0.2s ease; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; box-shadow: 0 6px 0 var(--lobby-btn-border); }
        .lesson-btn:hover { background: var(--lobby-btn-hover); transform: translateY(-2px); box-shadow: 0 8px 0 var(--lobby-btn-border); }
        .lesson-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--lobby-btn-border); }

        #game-container { max-width: 1200px; width: 100%; margin: 0 auto; height: 100dvh; display: none; flex-direction: column; align-items: center; padding: 8px; overflow: hidden; }
        @media (min-width: 768px) { #game-container { padding: 15px; } }
        
        .header-panel { background: var(--panel-bg); padding: 8px 15px; border-radius: 50px; box-shadow: 0 6px 0 var(--panel-border); display: flex; gap: 10px; align-items: center; margin-bottom: 8px; width: 100%; flex-wrap: wrap; justify-content: center; flex-shrink: 0; }
        @media (min-width: 768px) { .header-panel { padding: 12px 25px; gap: 20px; margin-bottom: 15px; } }
        
        .back-btn { background: var(--bg-base); color: var(--text-main); border: 2px solid var(--panel-border); padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { background: var(--lobby-btn-hover); }

        .word-search-grid { display: grid; gap: 4px; background-color: var(--panel-bg); padding: 12px; border-radius: 20px; box-shadow: 0 10px 25px rgba(105, 101, 97, 0.08); border: 8px solid var(--grid-border); position: relative; touch-action: none; z-index: 1; width: 100%; height: 100%; }
        .cell { width: 100%; height: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background-color: var(--cell-bg); border-radius: 10px; font-weight: bold; font-size: var(--cell-font-size, 20px); color: var(--text-main); cursor: pointer; transition: all 0.15s ease; border: 2px solid var(--cell-border); box-shadow: 0 3px 0 var(--panel-border); z-index: 2; }
        .cell:hover:not(.found):not(.selected) { background-color: var(--cell-hover); transform: translateY(-2px); }
        .cell.selected { background-color: var(--cell-selected-bg); border-color: var(--cell-selected-border); color: var(--cell-selected-text); transform: scale(1.1) !important; box-shadow: 0 4px 0 var(--cell-selected-border) !important; filter: brightness(0.95); z-index: 10; }
        .cell.path-preview { transform: scale(1.08) translateY(-2px); background-color: var(--cell-hover); border-color: var(--cell-selected-border); z-index: 8; box-shadow: 0 4px 0 var(--panel-border); }
        .cell.found { background-color: var(--cell-found-bg) !important; border-color: var(--cell-found-border) !important; color: var(--cell-found-text) !important; box-shadow: none !important; animation: pop 0.4s ease; }
        .preview-line { position: absolute; background-color: var(--cell-selected-bg); opacity: 0.5; z-index: 1; border-radius: 20px; pointer-events: none; transform-origin: left center; }

        .word-list { display: flex; flex-wrap: wrap; gap: 12px; justify-content: flex-start; width: 100%; }
        .word-tag { background: var(--panel-bg); padding: 10px 18px; border-radius: 20px; font-size: 1rem; color: var(--text-light); border: 2px dashed var(--panel-border); transition: all 0.3s; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; position: relative; }
        .word-tag.found { background: var(--cell-found-bg); color: var(--cell-found-text); border: 2px solid var(--cell-found-border); box-shadow: 0 4px 0 var(--cell-found-border); opacity: 1; }
        .word-tag.found:active { transform: translateY(4px); box-shadow: none; }
        .crown-icon { position: absolute; top: -12px; right: -10px; color: #F4D03F; font-size: 1.3rem; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2)); transform: rotate(15deg); z-index: 10; }
        .plus-50 { display: inline-block; color: #2E7D32; font-weight: 900; margin-left: 8px; animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .list-panel-box { display: flex; flex-direction: column; overflow: hidden; }
        .word-list-scroll { overflow-y: auto; overflow-x: hidden; flex: 1; padding: 16px 16px 10px 4px; align-content: flex-start; }
        .word-list-scroll::-webkit-scrollbar { width: 6px; }
        .word-list-scroll::-webkit-scrollbar-track { background: var(--bg-base); border-radius: 10px; }
        .word-list-scroll::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 10px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(105, 101, 97, 0.6); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(5px); }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--panel-bg); padding: 35px 25px 25px 25px; border-radius: 30px; text-align: center; max-width: 90%; width: 450px; border: 8px solid var(--grid-border); box-shadow: 0 20px 50px rgba(0,0,0,0.15); transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; display: flex; flex-direction: column; align-items: center; max-height: 90vh; overflow-y: auto; }
        .modal-overlay.show .modal-content { transform: scale(1); }
        .modal-header-bar { position: absolute; top: 0; left: 0; width: 100%; height: 12px; background: var(--btn-blue); }
        .close-btn { position: absolute; top: 15px; right: 15px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: #F0EBE5; color: #9B9895; cursor: pointer; transition: 0.2s; font-size: 1.2rem; }
        .close-btn:hover { background: #E8E4DF; color: #696561; }

        .meaning-box { background: var(--bg-base); padding: 15px; border-radius: 15px; margin: 10px 0; color: var(--text-main); text-align: left; font-size: 1.1rem; line-height: 1.6; border-left: 5px solid var(--panel-border); width: 100%; }
        .content-box { padding: 15px; border-radius: 15px; margin: 10px 0; text-align: left; font-size: 1rem; line-height: 1.6; width: 100%; display: none; }
        .content-box.show { display: block; animation: fadeIn 0.4s; }
        .box-sentence { background: #EDF1F4; border-left: 5px solid var(--btn-blue); color: #5B6B75; }
        .box-quiz { background: #EEF3ED; border-left: 5px solid var(--btn-green); color: #586B54; }

        .quiz-option { background: white; border: 2px solid var(--panel-border); padding: 10px 12px; margin-top: 8px; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-weight: bold; }
        .quiz-option:hover { background: var(--bg-base); }
        .quiz-option.correct { background: var(--cell-found-bg); border-color: var(--cell-found-border); color: var(--cell-found-text); pointer-events: none; }
        .quiz-option.wrong { background: #E8D6D6; border-color: #CFA3A3; color: #8A5A5A; pointer-events: none; }

        .btn { color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: all 0.15s; margin: 5px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active:not(:disabled) { transform: translateY(4px); box-shadow: none !important; }
        .btn:disabled { background-color: var(--grid-border) !important; box-shadow: none !important; cursor: not-allowed; transform: none; opacity: 0.7; }
        .btn-sentence { background: var(--btn-blue); box-shadow: 0 4px 0 #8DA0AC; }
        .btn-sentence:hover { background: var(--btn-blue-hover); }
        .btn-quiz { background: var(--btn-green); box-shadow: 0 4px 0 #9DB099; }
        .btn-quiz:hover { background: var(--btn-green-hover); }
        
        /* 👉 新增：按鈕震動與警示狀態 */
        .btn-shake { animation: shake 0.4s !important; background-color: #E74C3C !important; box-shadow: 0 4px 0 #C0392B !important; color: white !important; }

        /* 👉 修正：優化短文測驗的響應式(RWD)佈局，徹底解決手機端畫面跑版問題 */
        #fill-blank-modal .modal-content {
            width: 1000px; max-width: 95%; padding: 40px 30px; background: #FAFAFA;
            flex-direction: row; align-items: stretch; gap: 20px; text-align: left; overflow: hidden;
            height: 85vh; /* 限制電腦端最高高度，避免內容撐破 */
        }
        
        @media (max-width: 768px) {
            #fill-blank-modal .modal-content { 
                flex-direction: column; 
                height: 92dvh; /* 適配手機動態視窗高度 */
                padding: 45px 15px 15px 15px; /* 上方預留空間給關閉按鈕 */
                gap: 10px;
            }
            .article-col { flex: 1 !important; padding-right: 5px !important; max-height: none !important; }
            .words-col { 
                flex: none !important; 
                height: 42%; /* 固定下方選單區塊高度，讓文章與選項可同時顯示 */
                width: 100% !important; 
                margin-top: 0 !important; 
                padding: 15px !important;
                border-radius: 15px !important;
            }
        }
        
        /* 移除原本的 max-height 與 sticky，改由 Flexbox 的 min-height: 0 強制內部捲軸 */
        .article-col { flex: 2; overflow-y: auto; min-height: 0; padding-right: 15px; scroll-behavior: smooth; }
        .words-col { flex: 1; background: var(--bg-base); padding: 20px; border-radius: 20px; border: 4px solid var(--grid-border); display: flex; flex-direction: column; gap: 15px; min-height: 0; overflow-y: auto; }
        
        .article-col::-webkit-scrollbar { width: 8px; }
        .article-col::-webkit-scrollbar-track { background: transparent; }
        .article-col::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 10px; }

        .article-box { background: white; padding: 25px; border-radius: 20px; font-size: 1.2rem; line-height: 2.2; color: var(--text-main); border: 2px dashed var(--panel-border); margin-bottom: 20px; width: 100%; transition: all 0.3s; }
        
        .dropzone { display: inline-block; min-width: 80px; height: 38px; margin: 0 6px; border-bottom: 3px solid var(--btn-blue); background: #EDF1F4; vertical-align: middle; text-align: center; line-height: 38px; border-radius: 8px 8px 0 0; color: var(--btn-blue); font-weight: bold; transition: all 0.3s; cursor: pointer; padding: 0 10px; position: relative; }
        .dropzone.active-target { background: #D5E1E8; border-bottom-color: var(--btn-orange); }
        .dropzone.correct { background: var(--cell-found-bg); border-bottom-color: var(--cell-found-border); color: white; pointer-events: none; transform: scale(1.05); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .dropzone.wrong { background: #FCE8E8; border-bottom-color: #E74C3C; color: #C0392B; animation: shake 0.4s; }
        .dropzone.filled { background: var(--btn-blue); color: white; border-bottom-color: var(--btn-blue-hover); }
        .dropzone.checking { animation: pulseCheck 0.5s infinite; border-bottom-color: var(--btn-orange); background: #FFF3E0; color: var(--text-main); }
        
        .coin-popup { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); color: #F1C40F; font-weight: 900; font-size: 1.2rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2); pointer-events: none; z-index: 50; animation: floatUp 0.8s forwards ease-out; opacity: 0; }

        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-start; width: 100%; }
        .drag-word { background: var(--panel-bg); border: 2px solid var(--btn-blue); color: var(--btn-blue); padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: grab; user-select: none; transition: all 0.2s; box-shadow: 0 4px 0 var(--btn-blue); }
        .drag-word:active { cursor: grabbing; transform: translateY(4px); box-shadow: none; }
        .drag-word.selected-for-touch { background: var(--btn-blue); color: white; transform: translateY(2px); box-shadow: 0 2px 0 var(--btn-blue-hover); }
        .drag-word.used { display: none; } 

        #init-loader { position: fixed; inset: 0; background: var(--bg-base); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-main); }
        canvas#fireworks { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 90; }

        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
        @keyframes pop { 0% { transform: scale(0.9); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes pulseCheck { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes floatUp { 0% { transform: translate(-50%, 0) scale(0.8); opacity: 1; } 100% { transform: translate(-50%, -40px) scale(1.2); opacity: 0; } }
    </style>
</head>
<body>

    <div class="footer-version">大榮老師製作 © 2026 | Version 4.1 (v4.1)</div>

    <div id="init-loader">
        <i class="fas fa-circle-notch fa-spin text-5xl mb-4" style="color: var(--btn-blue)"></i>
        <h2 class="text-2xl font-bold">正在準備教材...</h2>
        <p class="mt-2 opacity-70" id="loader-msg">讀取雲端題庫與快取中</p>
    </div>

    <canvas id="fireworks"></canvas>

    <!-- 大廳 -->
    <div id="lobby-container">
        <div class="lobby-panel">
            <div class="inline-block p-4 rounded-full bg-white mb-4 shadow-sm border-2 border-gray-100">
                <i class="fas fa-leaf text-5xl" style="color: var(--btn-green)"></i>
            </div>
            <h1 class="text-4xl font-black mb-2 tracking-wider">語詞探索遊戲</h1>
            <p class="font-bold opacity-60 mb-8">請選擇你要挑戰的單元</p>
            <div id="lesson-buttons" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <!-- 遊戲畫面 -->
    <div id="game-container">
        <div class="header-panel flex justify-between">
            <button onclick="returnToLobby()" class="back-btn">
                <i class="fas fa-home"></i> <span class="hidden md:inline">回大廳</span>
            </button>
            
            <h1 id="game-title" class="text-lg md:text-2xl font-bold tracking-wider m-0">單元名稱</h1>
            
            <div class="flex items-center gap-2 md:gap-3">
                <button onclick="startGame(currentLessonName)" class="back-btn" style="color: var(--btn-green); border-color: var(--btn-green); padding: 4px 12px md:padding: 8px 16px;">
                    <i class="fas fa-redo-alt"></i> <span class="hidden md:inline">重玩</span>
                </button>
                <div class="flex items-center gap-1 md:gap-2 font-bold text-sm md:text-lg px-3 py-1 md:px-4 rounded-full bg-white border-2" style="border-color: var(--panel-border);">
                    <i class="fas fa-clock" style="color: var(--btn-blue)"></i> 
                    <span id="time-display">00:00</span>
                </div>
                <div class="flex items-center gap-1 md:gap-2 font-bold text-sm md:text-lg px-3 py-1 md:px-4 rounded-full bg-white border-2" style="border-color: var(--panel-border);">
                    <i class="fas fa-star" style="color: var(--btn-orange)"></i> 
                    <span id="score-display">0</span> 分
                </div>
            </div>
        </div>

        <div class="text-center mb-2 md:mb-4">
            <p class="font-bold px-3 py-1 md:px-4 md:py-2 text-xs md:text-base rounded-full inline-block bg-white border-2" style="border-color: var(--panel-border); color: var(--text-light);">
                <i class="fas fa-info-circle" style="color: var(--btn-blue)"></i> 玩法：點選目標語詞的「頭」「尾」兩字連線，完成測驗解鎖短文關卡
            </p>
        </div>

        <div class="flex flex-col md:flex-row gap-2 md:gap-8 w-full h-full flex-1 min-h-0" id="main-content-area">
            <div id="grid-wrapper" class="flex justify-center items-center shrink-0 w-full md:w-auto h-auto md:h-full">
                <div id="grid-container" class="word-search-grid"></div>
            </div>

            <div id="right-panel" class="list-panel-box bg-white p-3 md:p-6 rounded-3xl border-4 flex-1 min-h-0 w-full" style="border-color: var(--panel-border);">
                <div class="flex justify-between items-end mb-2 md:mb-4 border-b-2 pb-2 shrink-0" style="border-color: var(--bg-base);">
                    <h2 class="text-xl font-bold"><i class="fas fa-list-ul"></i> 尋找目標</h2>
                    <span class="text-sm font-bold px-3 py-1 rounded-full" style="background: var(--bg-base); color: var(--text-light);">
                        <span id="found-count">0</span> / <span id="total-count">0</span>
                    </span>
                </div>
                
                <div id="word-list-container" class="word-list word-list-scroll"></div>
                
                <div id="essay-btn-container" class="mt-4 flex justify-center hidden pb-2 shrink-0 border-t-2 pt-4" style="border-color: var(--bg-base);">
                    <button onclick="startFillInTheBlankTest()" class="btn btn-sentence text-lg px-8 py-3 w-full shadow-md" style="animation: bounceIn 0.8s;">
                        <i class="fas fa-scroll"></i> 短文測驗
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 學習 Modal -->
    <div id="learning-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header-bar" id="modal-color-bar"></div>
            <button onclick="closeModal()" class="close-btn"><i class="fas fa-times"></i></button>
            <h2 id="modal-word" class="text-3xl font-bold mb-1 mt-2 tracking-widest">語詞</h2>
            <div class="meaning-box"><p id="modal-meaning"></p></div>
            <div id="content-box" class="content-box box-sentence"></div>
            <div id="quiz-box" class="content-box box-quiz">
                <p id="quiz-question" class="font-bold mb-3 text-lg"></p>
                <div id="quiz-options" class="flex flex-col"></div>
            </div>
            <div class="flex justify-center mt-4 w-full gap-2 border-t-2 pt-4" style="border-color: var(--bg-base);" id="modal-buttons">
                <button onclick="showContent('sentence')" id="btn-ai-sentence" class="btn btn-sentence flex-1">
                    <i class="fas fa-pencil-alt"></i> 造句
                </button>
                <button onclick="showContent('quiz')" id="btn-ai-quiz" class="btn btn-quiz flex-1">
                    <i class="fas fa-question-circle"></i> 測驗
                </button>
            </div>
        </div>
    </div>

    <!-- 結算 Modal -->
    <div id="game-over-modal" class="modal-overlay">
        <div class="modal-content overflow-hidden" style="width: 400px; padding: 40px 30px;">
            <div class="modal-header-bar" style="background: var(--btn-orange)"></div>
            <button onclick="document.getElementById('game-over-modal').classList.remove('show')" class="close-btn"><i class="fas fa-times"></i></button>
            
            <i class="fas fa-trophy text-6xl mb-4 mt-2 text-yellow-400" style="filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));"></i>
            <h2 class="text-3xl font-black mb-6 text-gray-700">過關！</h2>
            
            <div class="bg-gray-50 rounded-2xl p-5 w-full border-2 border-gray-100 mb-2">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-gray-500 font-bold text-lg"><i class="fas fa-star text-orange-400"></i> 總得分</span>
                    <span class="text-2xl font-black text-orange-500" id="final-score">0</span>
                </div>
                <div class="flex justify-between items-center border-t-2 border-gray-200 pt-3">

        window.onload = async function() {
            try {
                // 👉 修正 1：加入時間戳章避免瀏覽器快取，並強制跟隨 GAS 重新導向
                const fetchUrl = GAS_API_URL + (GAS_API_URL.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
                const response = await fetch(fetchUrl, {
                    method: 'GET',
                    redirect: 'follow'
                });
                
                if (!response.ok) throw new Error(`網路連線異常 (HTTP ${response.status})`);
                
                // 👉 修正 2：先以純文字讀取。若直接用 json()，遇到權限錯誤吐出 HTML 時會導致整個網頁白畫面
                const textData = await response.text();
                let data;
                try {
                    data = JSON.parse(textData);
                } catch (e) {
                    console.error("API 回傳了非 JSON 的格式，內容為:", textData);
                    throw new Error("後端權限異常，請確認 GAS 部署權限是否設為「所有人 (Anyone)」");
                }
                
                // 👉 修正 3：精準捕捉後端 (.gs) 拋出的錯誤
                if (data.error) throw new Error(`後端回報錯誤: ${data.error}`);
                
                allWordData = processSheetData(data.words || data);
                cachedStories = data.stories || {};
                
                if (allWordData.length === 0) throw new Error("讀取到的題庫為空");
            } catch (err) {
                // 👉 修正 4：在畫面上顯示明顯的錯誤狀態，方便我們找出原因
                console.error("⛔ 題庫讀取失敗詳細原因:", err);

                    loaderMsg.innerText = "連線異常，載入預設題庫中...";

                console.log("ℹ️ " + err.message + "，使用預設題庫。");
                allWordData = getFallbackData();
            }
            
            await new Promise(resolve => setTimeout(resolve, 500));
            document.getElementById('init-loader').style.display = 'none';
            renderLobby();
        };

        function processSheetData(data) {
            let processed = [];
            const getVal = (row, possibleKeys) => {
                let bestMatch = undefined;
                for (let key in row) {
                    let cleanKey = String(key).replace(/[\s\(\)（）]+/g, '').toLowerCase(); 
                    for (let pk of possibleKeys) {
                        if (cleanKey === pk.toLowerCase()) return row[key]; 
                        if (cleanKey.includes(pk.toLowerCase())) bestMatch = row[key]; 
                    }
                }
                return bestMatch;
            };

            data.forEach(row => {
                let wordRaw = getVal(row, ['語詞', '單字', '成語']);
                if (!wordRaw || String(wordRaw).trim() === '') return;
                
                let unitName = getVal(row, ['單元名稱', '單元', '課名']) || "綜合單元";
                let word = String(wordRaw).trim();

                let sentences = [];
                for (let i = 1; i <= 5; i++) {
                    let s = getVal(row, [`造句${i}`]);
                    if (s) sentences.push(String(s).trim());
                }
                let sMain = getVal(row, ['造句']);
                if (sentences.length === 0 && sMain) sentences = String(sMain).split('\n').map(s => s.trim()).filter(s => s !== '');
                if (sentences.length === 0) sentences.push(`這是一個關於「${word}」的造句。`);

                // 👉 修正：加入前端嚴格解析「正確答案」邏輯，確保選項隨機後依舊能對應到正確答案
                let correctIdx = 0;
                let ansRaw = getVal(row, ['正確答案(1-3)', '正確答案', '答案', '解答']);
                if (ansRaw !== undefined && String(ansRaw).trim() !== "") {
                    let ansStr = String(ansRaw).replace(/\s+/g, '').toLowerCase();
                    // 支援全形轉半形
                    ansStr = ansStr.replace(/[\uff01-\uff5e]/g, function(ch) { return String.fromCharCode(ch.charCodeAt(0) - 0xfee0); });
                    if (ansStr.includes('2') || ansStr.includes('二') || ansStr.includes('b')) correctIdx = 1;
                    else if (ansStr.includes('3') || ansStr.includes('三') || ansStr.includes('c')) correctIdx = 2;
                    else if (ansStr.includes('1') || ansStr.includes('一') || ansStr.includes('a')) correctIdx = 0;
                } else if (row['computedCorrectIndex'] !== undefined) {
                    correctIdx = parseInt(row['computedCorrectIndex']);
                }

                let clue = getVal(row, ['解釋', '提示']) || "請找出這個語詞";
                let question = getVal(row, ['測驗題目', '題目', '問題']) || `請問關於「${word}」的解釋何者最接近？`;

                let opt1 = getVal(row, ['選項1', '選項一']) || (correctIdx === 0 ? clue : "錯誤的選項 A");
                let opt2 = getVal(row, ['選項2', '選項二']) || (correctIdx === 1 ? clue : "錯誤的選項 B");
                let opt3 = getVal(row, ['選項3', '選項三']) || (correctIdx === 2 ? clue : "錯誤的選項 C");

                processed.push({
                    unit: unitName, word: word, clue: clue, origin: getVal(row, ['典故']) || "尚無典故資料。",
                    sentences: sentences, quiz: { question: question, options: [opt1, opt2, opt3], correctIndex: correctIdx }
                });
            });
            return processed;
        }

        function returnToLobby() { stopTimer(); renderLobby(); }

        function startGame(unitName) {
            currentLessonName = unitName;
            currentLessonData = allWordData.filter(item => item.unit === unitName);

        function startTimer() {
            clearInterval(timerInterval);

        function stopTimer() { clearInterval(timerInterval); }
        function formatTime(secs) {
            let m = String(Math.floor(secs / 60)).padStart(2, '0');
            let s = String(secs % 60).padStart(2, '0');
            return `${m}:${s}`;

        function syncPanelHeight() {
            const mainArea = document.getElementById('main-content-area');
            const gridWrapper = document.getElementById('grid-wrapper');
            const gridContainer = document.getElementById('grid-container');
            const rightPanel = document.getElementById('right-panel');
            if (!mainArea || !gridContainer || !rightPanel || !gridWrapper) return;

            const isDesktop = window.innerWidth >= 768;
            
            if (isDesktop) {
                // 電腦與平板橫向：以高度為主，但不超過螢幕 65% 寬度
                const availableHeight = mainArea.clientHeight;
                const availableWidth = mainArea.clientWidth * 0.65; 
                const size = Math.min(availableHeight, availableWidth);
                
                gridWrapper.style.width = size + 'px';
                gridWrapper.style.height = size + 'px';
                rightPanel.style.maxHeight = size + 'px';
            } else {
                // 手機直向：以寬度為主，但高度最多只允許佔用可用空間的 45% (增加下方列表空間)
                const availableWidth = mainArea.clientWidth;
                const maxGridHeight = mainArea.clientHeight * 0.45; 
                const size = Math.min(availableWidth, maxGridHeight);
                
                gridWrapper.style.width = size + 'px';
                gridWrapper.style.height = size + 'px';
                rightPanel.style.maxHeight = 'none';
            }

            // 動態計算格子的字體大小，避免破版
            if (GRID_SIZE) {
                const innerSize = gridContainer.clientWidth - 24; 
                const cellSize = innerSize / GRID_SIZE;
                document.documentElement.style.setProperty('--cell-font-size', Math.max(14, cellSize * 0.45) + 'px');
            }
            
            // 視窗縮放時，重新繪製連線預覽
            if (startCell && previewLine && previewLine.style.display !== 'none') {
                const currentHover = document.querySelector('.cell.path-preview:last-child') || document.querySelector('.cell.selected');
                if (currentHover) updatePreviewLine(startCell, currentHover);
            }
        }
        window.addEventListener('resize', syncPanelHeight);

        function initGame() {
            const maxWordLen = Math.max(...currentLessonData.map(w => w.word.length));
            GRID_SIZE = Math.max(8, Math.min(12, Math.ceil(maxWordLen * 1.3) + Math.floor(currentLessonData.length / 4)));
            
            const allChars = currentLessonData.map(w => w.word).join('');
            const uniqueChars = [...new Set(allChars.split(''))];
            const extraChars = "的是了我不人在他有這一個上們來到時大地為子中你說生國年那就和要她出也得裡後自以會家可下而過天去能對小多然於心學麼起都把好太水作";
            const fillerChars = uniqueChars.join('') + extraChars;

            placedWordsInfo = []; foundWords = []; perfectWords = []; quizStatus = {}; failedWords = []; 
            isEndGameTriggered = false; score = 0; colorIndex = 0; 
            document.getElementById('essay-btn-container').classList.add('hidden');
            
            // 👉 修正：加入防呆迴圈，確保所有字詞100%成功塞入棋盤，若塞不下則擴大棋盤重試
            let boardGenerated = false;
            while (!boardGenerated) {
                grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(''));
                placedWordsInfo = [];
                let wordsToPlace = [...currentLessonData].sort(() => 0.5 - Math.random());
                boardGenerated = true;
                
                for (let item of wordsToPlace) {
                    if (!placeWord(item.word)) {
                        boardGenerated = false;
                        GRID_SIZE++; // 若發生擁擠無法放置，動態擴大1格棋盤並重試
                        if (GRID_SIZE > 16) boardGenerated = true; // 防呆上限，避免無窮迴圈
                        break;
                    }
                }
            }
            
            for(let r=0; r<GRID_SIZE; r++) {
                for(let c=0; c<GRID_SIZE; c++) {
                    if(grid[r][c] === '') grid[r][c] = fillerChars.charAt(Math.floor(Math.random() * fillerChars.length));
                }
            }
            
            renderBoard(); renderWordList(); setupInteractions();
            setTimeout(syncPanelHeight, 50);

            document.getElementById('total-count').innerText = currentLessonData.length;
            document.getElementById('found-count').innerText = "0";
            document.getElementById('score-display').innerText = "0";
            startTimer(); 
        }

        function placeWord(word) {
            const dirs = [ {dr:0, dc:1}, {dr:1, dc:0}, {dr:1, dc:1} ];
            for(let attempt=0; attempt<100; attempt++) {
                const dir = dirs[Math.floor(Math.random() * dirs.length)];
                const r = Math.floor(Math.random() * GRID_SIZE);
                const c = Math.floor(Math.random() * GRID_SIZE);
                if (canPlace(word, r, c, dir.dr, dir.dc)) {
                    for(let i=0; i<word.length; i++) grid[r + i*dir.dr][c + i*dir.dc] = word[i];
                    placedWordsInfo.push({ word: word, start: {r, c}, end: {r: r + (word.length-1)*dir.dr, c: c + (word.length-1)*dir.dc} });
                    return;
                }
            }
        }

        function canPlace(word, r, c, dr, dc) {
            for(let i=0; i<word.length; i++) {
                const nr = r + i*dr; const nc = c + i*dc;
                if(nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) return false;
                if(grid[nr][nc] !== '' && grid[nr][nc] !== word[i]) return false;
            }
            return true;
        }

        function placeWord(word) {
            const dirs = [ {dr:0, dc:1}, {dr:1, dc:0}, {dr:1, dc:1} ];
            // 階段一：隨機抽樣尋找空位 (效率快)
            for(let attempt=0; attempt<100; attempt++) {
                const dir = dirs[Math.floor(Math.random() * dirs.length)];
                const r = Math.floor(Math.random() * GRID_SIZE);
                const c = Math.floor(Math.random() * GRID_SIZE);
                if (canPlace(word, r, c, dir.dr, dir.dc)) {
                    for(let i=0; i<word.length; i++) grid[r + i*dir.dr][c + i*dir.dc] = word[i];
                    placedWordsInfo.push({ word: word, start: {r, c}, end: {r: r + (word.length-1)*dir.dr, c: c + (word.length-1)*dir.dc} });
                    return true;
                }
            }
            
            // 階段二：如果運氣不好隨機100次都失敗，改用「地毯式搜索」確保找到空位
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    for (let dir of dirs) {
                        if (canPlace(word, r, c, dir.dr, dir.dc)) {
                            for(let i=0; i<word.length; i++) grid[r + i*dir.dr][c + i*dir.dc] = word[i];
                            placedWordsInfo.push({ word: word, start: {r, c}, end: {r: r + (word.length-1)*dir.dr, c: c + (word.length-1)*dir.dc} });
                            return true;
                        }
                    }
                }
            }
            
            // 階段三：真的完全沒有空位可以放了，回報失敗
            return false;

        function setupInteractions() {
            const board = document.getElementById('grid-container');
            const newBoard = board.cloneNode(true);
            board.parentNode.replaceChild(newBoard, board);
            
            previewLine = document.createElement('div');
            previewLine.className = 'preview-line'; previewLine.style.display = 'none';
            newBoard.appendChild(previewLine);
            startCell = null;

            newBoard.addEventListener('click', handleBoardClick);
            newBoard.addEventListener('mousemove', handleHoverPreview);
            newBoard.addEventListener('touchmove', (e) => { if (startCell) e.preventDefault(); }, {passive: false});
        }

        function handleBoardClick(e) {
            const target = e.target.nodeType === 3 ? e.target.parentNode : e.target;
            const cell = target.closest('.cell');
            if (!cell) return;

            const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);

            if (!startCell) {
                startCell = cell; cell.classList.add('selected'); updatePreviewLine(cell, cell);
            } else {
                if (startCell === cell) { clearSelection(); return; }
                const startR = parseInt(startCell.dataset.r), startC = parseInt(startCell.dataset.c);
                const dr = r - startR, dc = c - startC;
                if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) checkConnection(startR, startC, r, c);
                else {
                    clearSelection(); startCell = cell; cell.classList.add('selected'); updatePreviewLine(cell, cell);
                }
            }
        }

        function handleHoverPreview(e) {
            if (!startCell) return;
            const target = e.target.nodeType === 3 ? e.target.parentNode : e.target;
            const currentCell = target.closest('.cell');
            clearPathPreview();

            if (!currentCell) { if (previewLine) previewLine.style.display = 'none'; return; }

            const startR = parseInt(startCell.dataset.r), startC = parseInt(startCell.dataset.c);
            const currR = parseInt(currentCell.dataset.r), currC = parseInt(currentCell.dataset.c);
            const dr = currR - startR, dc = currC - startC;
            if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) {
                updatePreviewLine(startCell, currentCell);
                const stepR = Math.sign(dr), stepC = Math.sign(dc), steps = Math.max(Math.abs(dr), Math.abs(dc));
                for (let i = 0; i <= steps; i++) {
                    let r = startR + i * stepR, c = startC + i * stepC;
                    let cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
                    if (cell && cell !== startCell) cell.classList.add('path-preview');
                }
            } else if (previewLine) previewLine.style.display = 'none';
        }

        function clearPathPreview() { document.querySelectorAll('.cell.path-preview').forEach(c => c.classList.remove('path-preview')); }

        function updatePreviewLine(cellA, cellB) {
            if (!previewLine) return;
            const boardBox = document.getElementById('grid-container').getBoundingClientRect();
            const boxA = cellA.getBoundingClientRect(), boxB = cellB.getBoundingClientRect();
            const x1 = boxA.left + boxA.width/2 - boardBox.left, y1 = boxA.top + boxA.height/2 - boardBox.top;
            const x2 = boxB.left + boxB.width/2 - boardBox.left, y2 = boxB.top + boxB.height/2 - boardBox.top;
            const distance = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;

            previewLine.style.height = `${boxA.height * 0.8}px`; previewLine.style.width = `${distance + boxA.width * 0.8}px`;
            previewLine.style.left = `${x1 - (boxA.width * 0.4)}px`; previewLine.style.top = `${y1 - (boxA.height * 0.4)}px`;
            previewLine.style.transform = `rotate(${angle}deg)`; previewLine.style.display = 'block';
        }

        function clearSelection() {
            if (startCell) startCell.classList.remove('selected');
            startCell = null; if (previewLine) previewLine.style.display = 'none'; clearPathPreview();
        }

        function checkConnection(r1, c1, r2, c2) {
            const dr = Math.sign(r2 - r1), dc = Math.sign(c2 - c1), steps = Math.max(Math.abs(r2 - r1), Math.abs(c2 - c1));
            let selectedWord = ""; let cellsToMark = [];
            for (let i = 0; i <= steps; i++) {
                let r = r1 + i * dr, c = c1 + i * dc;
                selectedWord += grid[r][c];
                cellsToMark.push(document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`));
            }

            const reversedWord = selectedWord.split('').reverse().join('');
            let matchedWord = null;
            if (currentLessonData.some(w => w.word === selectedWord)) matchedWord = selectedWord;
            else if (currentLessonData.some(w => w.word === reversedWord)) matchedWord = reversedWord;

            if (matchedWord && !foundWords.includes(matchedWord)) {
                foundWords.push(matchedWord);
                const color = earthTonePalette[colorIndex % earthTonePalette.length]; colorIndex++;
                cellsToMark.forEach(cell => {
                    if(cell) {
                        cell.classList.remove('selected'); cell.classList.add('found');
                        if (!cell._foundColors) cell._foundColors = [];
                        if (!cell._foundColors.includes(color.bg)) cell._foundColors.push(color.bg);
                        if (cell._foundColors.length === 1) cell.style.setProperty('background', cell._foundColors[0], 'important');
                        else cell.style.setProperty('background', `linear-gradient(135deg, ${cell._foundColors.join(', ')})`, 'important');
                        cell.style.setProperty('border-color', color.border, 'important'); cell.style.setProperty('color', color.text, 'important');
                    }
                });
                
                const tag = document.getElementById(`word-${matchedWord}`);
                if (tag) {
                    tag.classList.add('found');
                    tag.innerHTML = `<span>${matchedWord}</span> ${tag.querySelector('.crown-icon') ? '<i class="fas fa-crown crown-icon"></i>' : ''}`;
                    tag.style.setProperty('background-color', color.bg, 'important'); tag.style.setProperty('border-color', color.border, 'important');
                    tag.style.setProperty('color', color.text, 'important'); tag.style.setProperty('box-shadow', `0 4px 0 ${color.border}`, 'important');
                }
                
                score += matchedWord.length * 50;
                document.getElementById('score-display').innerText = score;
                document.getElementById('found-count').innerText = foundWords.length;
                setTimeout(() => openModal(matchedWord), 400);

                if (foundWords.length === currentLessonData.length) {
                    stopTimer(); 
                    if (!lessonRecords[currentLessonName] || score > lessonRecords[currentLessonName].score) {
                        lessonRecords[currentLessonName] = { score: score, time: timeElapsed };
                    }
                }
            }
            clearSelection();
        }

        async function callGeminiAPI(allWordsStr, unitName) {
            // 👉 修正：後端 doPost 期待的是 prompt，並且讓 AI 產生的文章更符合要求
            const promptText = `請用以下語詞寫一篇適合閱讀的短文(約150字)：${allWordsStr}。請確保文章通順且語意自然，適合做為國語文填空測驗。`;
            const response = await fetch(GAS_API_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify({ prompt: promptText, unitName: unitName }) 
            });
            if (!response.ok) throw new Error(`連線失敗 HTTP ${response.status}`);
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            return data.text;
        }

        async function startFillInTheBlankTest() {
            const modal = document.getElementById('fill-blank-modal');
            const loadingBox = document.getElementById('fb-loading');
            const colArticle = document.getElementById('fb-article-col');
            const colWords = document.getElementById('fb-words-col');
            
            document.getElementById('header-msg-area').innerHTML = '';
            
            loadingBox.innerHTML = `<i class="fas fa-pen-fancy text-5xl mb-4 text-purple-400 animate-pulse"></i><p class="text-xl font-bold text-gray-600">正在準備專屬短文測驗<span class="loading-dots"></span></p><p class="text-sm text-gray-400 mt-2">尋找快取文章或呼叫 AI 中</p>`;
            
            modal.classList.add('show');
            loadingBox.classList.remove('hidden');
            colArticle.classList.add('hidden');
            colWords.classList.add('hidden');
            
            let cachedList = cachedStories[currentLessonName] || [];
            currentEssayRound = 1;

            // 👉 五連關機制：從快取隨機挑 5 篇。若不夠 5 篇則重複利用並於背景呼叫補齊
            if (cachedList.length >= 5) {
                currentEssayList = [...cachedList].sort(() => 0.5 - Math.random()).slice(0, 5);
            } else if (cachedList.length > 0) {
                currentEssayList = [];
                for(let i=0; i<5; i++) currentEssayList.push(cachedList[i % cachedList.length]);
                let allWordsStr = currentLessonData.map(w => w.word).join('、');
                callGeminiAPI(allWordsStr, currentLessonName).catch(e => console.warn("背景補充短文失敗:", e));
            } else {
                try {
                    let allWordsStr = currentLessonData.map(w => w.word).join('、');
                    let newText = await callGeminiAPI(allWordsStr, currentLessonName);
                    if (!cachedStories[currentLessonName]) cachedStories[currentLessonName] = [];
                    cachedStories[currentLessonName].push(newText); 
                    currentEssayList = Array(5).fill(newText);
                } catch (err) {
                    loadingBox.innerHTML = `<i class="fas fa-exclamation-triangle text-5xl mb-6 text-red-400"></i><p class="text-xl font-bold text-red-600 mb-2">生成失敗</p><p class="text-sm text-gray-500">目前沒有足夠的快取文章，請稍候重試。</p>`;
                    return; 
                }
            }
            
            await new Promise(resolve => setTimeout(resolve, 600)); 
            loadEssayRound();
        }

        function loadEssayRound() {
            const loadingBox = document.getElementById('fb-loading');
            const colArticle = document.getElementById('fb-article-col');
            const colWords = document.getElementById('fb-words-col');
            
            // 重置 UI 與提示訊息
            document.getElementById('header-msg-area').innerHTML = '';
            document.getElementById('learning-hints-container').innerHTML = '';
            document.getElementById('learning-hints-container').classList.add('hidden');
            document.getElementById('check-ans-btn').classList.add('hidden');
            document.getElementById('next-essay-btn').classList.add('hidden');
            document.getElementById('check-ans-btn').disabled = false;
            document.getElementById('check-ans-btn').innerHTML = '<i class="fas fa-tasks"></i> 批改答案';
            
            document.getElementById('essay-round-badge').innerText = `第 ${currentEssayRound} / 5 關`;
            
            selectedTouchWord = null; 
            let aiText = currentEssayList[currentEssayRound - 1];
            let allWords = currentLessonData.map(w => w.word);

            const articleContainer = document.getElementById('article-container');
            const bankContainer = document.getElementById('word-bank-container');
            articleContainer.innerHTML = ''; bankContainer.innerHTML = '';

            let wordsToBank = [];
            let sortedWords = [...allWords].sort((a,b) => b.length - a.length);

            let hasAnyMatch = false;
            let matchCount = 0;

            for (let w of sortedWords) {
                if (aiText.includes(w)) {
                    hasAnyMatch = true;
                    if (matchCount < 7) {
                        let regex = new RegExp(w, 'g');
                        aiText = aiText.replace(regex, `<span class="dropzone" data-answer="${w}"></span>`);
                        wordsToBank.push(w);
                        matchCount++;
                    }
                }
            }

            if (!hasAnyMatch) {
                // 若偶發文章無符合字詞，直接跳下一關
                currentEssayRound++;
                if (currentEssayRound <= 5) loadEssayRound();
                else document.getElementById('fill-blank-modal').classList.remove('show');
                return;
            }

            articleContainer.innerHTML = aiText.replace(/\n/g, '<br>');

            wordsToBank.sort(() => Math.random() - 0.5);
            wordsToBank.forEach((w, i) => {
                const wDiv = document.createElement('div'); wDiv.className = 'drag-word'; wDiv.innerText = w; wDiv.draggable = true; wDiv.id = 'drag-word-' + currentEssayRound + '-' + i;
                wDiv.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', w); e.dataTransfer.setData('source-id', wDiv.id); });
                wDiv.addEventListener('click', () => {
                    document.querySelectorAll('.drag-word').forEach(el => el.classList.remove('selected-for-touch'));
                    wDiv.classList.add('selected-for-touch'); selectedTouchWord = { word: w, id: wDiv.id, el: wDiv };
                });
                bankContainer.appendChild(wDiv);
            });

            document.querySelectorAll('.dropzone').forEach(zone => {
                zone.addEventListener('dragover', e => { e.preventDefault(); if (!zone.classList.contains('correct')) zone.classList.add('active-target'); });
                zone.addEventListener('dragleave', () => zone.classList.remove('active-target'));
                zone.addEventListener('drop', e => {
                    e.preventDefault(); zone.classList.remove('active-target'); if (zone.classList.contains('correct') || zone.classList.contains('checking')) return;
                    handleFillBlank(zone, e.dataTransfer.getData('text/plain'), document.getElementById(e.dataTransfer.getData('source-id')));
                });
                zone.addEventListener('click', () => {
                    if (zone.classList.contains('correct') || zone.classList.contains('checking')) return;
                    if (zone.classList.contains('filled')) {
                        let prevWord = zone.innerText.trim(); zone.innerText = ''; zone.classList.remove('filled', 'wrong');
                        let sourceEl = Array.from(document.querySelectorAll('.drag-word')).find(el => el.innerText.trim() === prevWord);
                        if (sourceEl) sourceEl.classList.remove('used');
                        checkAllZonesFilled();
                    } else if (selectedTouchWord) {
                        handleFillBlank(zone, selectedTouchWord.word, selectedTouchWord.el);
                        document.querySelectorAll('.drag-word').forEach(el => el.classList.remove('selected-for-touch'));
                        selectedTouchWord = null;
                    }
                });
            });

            loadingBox.classList.add('hidden'); colArticle.classList.remove('hidden'); colWords.classList.remove('hidden');
        }
        
        function nextEssayRound() {
            currentEssayRound++;
            loadEssayRound();
        }

        function handleFillBlank(zone, word, sourceEl) {
            document.getElementById('header-msg-area').innerHTML = ''; // 動作時清除頂部提示
            if (zone.classList.contains('filled')) {
                let prevWord = zone.innerText.trim();
                let prevEl = Array.from(document.querySelectorAll('.drag-word')).find(el => el.innerText.trim() === prevWord);
                if (prevEl) prevEl.classList.remove('used');
            }
            zone.innerText = word; zone.classList.add('filled'); zone.classList.remove('wrong');
            if (sourceEl) sourceEl.classList.add('used');
            checkAllZonesFilled();
        }

        function checkAllZonesFilled() {
            let allFilled = true;
            document.querySelectorAll('.dropzone').forEach(z => { if (!z.innerText.trim()) allFilled = false; });
            if (allFilled) document.getElementById('check-ans-btn').classList.remove('hidden');
            else document.getElementById('check-ans-btn').classList.add('hidden');
        }

        async function checkAllAnswers() {
            const checkBtn = document.getElementById('check-ans-btn');
            // 👉 防止學生連點導致非同步流程錯亂
            if (checkBtn.disabled) return;
            
            checkBtn.disabled = true;
            checkBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 批改中...';
            
            const headerMsg = document.getElementById('header-msg-area');
            const hintsContainer = document.getElementById('learning-hints-container');
            headerMsg.innerHTML = '';
            hintsContainer.innerHTML = ''; 
            hintsContainer.classList.add('hidden');
            
            const zones = document.querySelectorAll('.dropzone');
            let allCorrect = true;
            let hasWrong = false;
            let wrongWordsHints = new Set(); // 👉 新增：用來蒐集這次答錯的語詞解釋

            try {
                for (let i = 0; i < zones.length; i++) {
                    const zone = zones[i];
                    if (zone.classList.contains('correct')) continue; 

                    // 👉 容錯處理：在某些舊版 iOS / Safari 呼叫平滑捲動會出錯，加上 Try Catch 保護
                    try {
                        zone.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } catch(e) {
                        zone.scrollIntoView(); 
                    }
                    
                    zone.classList.add('checking');
                    await new Promise(r => setTimeout(r, 600)); 
                    zone.classList.remove('checking');

                    // 👉 嚴格去空白，避免被多餘字元干擾
                    let filledWord = zone.innerText.trim();
                    let correctWord = zone.dataset.answer.trim();

                    if (filledWord === correctWord) {
                        zone.classList.remove('filled', 'wrong'); 
                        zone.classList.add('correct');
                        
                        // 👉 新增：只有「第一次」答對（沒有 failed 標記）才加分與顯示金幣
                        if (!zone.dataset.failed) {
                            const popup = document.createElement('div');
                            popup.className = 'coin-popup';
                            popup.innerHTML = '+20 <i class="fas fa-coins text-yellow-500"></i>';
                            zone.appendChild(popup);
                            
                            score += 20;
                            document.getElementById('score-display').innerText = score;
                            
                            setTimeout(() => popup.remove(), 1000);
                        }
                    } else {
                        allCorrect = false;
                        hasWrong = true;
                        zone.classList.add('wrong');
                        zone.dataset.failed = 'true'; // 👉 新增：在空格上貼上「已答錯過」的標籤
                        
                        // 👉 新增：查找填錯的語詞意思，並加入學習清單中
                        let wrongData = currentLessonData.find(w => w.word === filledWord);
                        if (wrongData) {
                            wrongWordsHints.add(`<b>【${filledWord}】</b> ${wrongData.clue}`);
                        }
                        
                        setTimeout(() => {
                            if (!zone.classList.contains('correct')) {
                                let currentText = zone.innerText.trim();
                                // 👉 強化退回邏輯：確保我們找的是已經在文章中（被標記為 used）的那個字詞
                                let sourceEl = Array.from(document.querySelectorAll('.drag-word')).find(el => el.innerText.trim() === currentText && el.classList.contains('used'));
                                zone.innerText = ''; zone.classList.remove('filled', 'wrong');
                                if (sourceEl) sourceEl.classList.remove('used');
                                checkAllZonesFilled(); 
                            }
                        }, 800);
                    }
                    
                    await new Promise(r => setTimeout(r, 200)); 
                }
            } catch (error) {
                // 👉 最強保護網：萬一發生未知錯誤，確保按鈕能恢復，不會卡死「批改中」
                console.error("批改過程發生錯誤:", error);
            } finally {
                if (allCorrect) {
                    checkBtn.classList.add('hidden');
                    headerMsg.innerHTML = '<span class="text-green-600 font-black animate-bounce inline-block"><i class="fas fa-check-double"></i> 太棒了！本關全對！</span>';
                    setTimeout(() => { showWinEffect(); }, 200);
                    
                    // 👉 五連關卡判斷
                    if (currentEssayRound < 5) {
                        document.getElementById('next-essay-btn').classList.remove('hidden');
                    } else {
                        setTimeout(() => {
                            document.getElementById('fill-blank-modal').classList.remove('show');
                            showGameOverModal(score, timeElapsed);
                        }, 1500);
                    }
                } else {
                    checkBtn.disabled = false;
                    checkBtn.innerHTML = '<i class="fas fa-tasks"></i> 批改答案';
                    checkBtn.classList.add('hidden'); 
                    if (hasWrong) {
                        headerMsg.innerHTML = '<span class="text-red-500 font-bold animate-pulse inline-block"><i class="fas fa-exclamation-circle"></i> 哎呀，有幾個填錯了！</span>';
                        if (wrongWordsHints.size > 0) {
                            let hintHtml = `
                                <div class="text-left text-[0.95rem] bg-[#FCE8E8] p-4 rounded-xl border-2 border-[#F5C6C6] text-[#C0392B]" style="animation: fadeIn 0.5s;">
                                    <div class="font-black mb-2"><i class="fas fa-lightbulb text-yellow-500"></i> 學習提示：剛剛填錯的語詞</div>
                                    <ul class="list-disc pl-5 space-y-1 font-medium">
                                        ${Array.from(wrongWordsHints).map(h => `<li>${h}</li>`).join('')}
                                    </ul>
                                </div>
                            `;
                            hintsContainer.innerHTML = hintHtml;
                            hintsContainer.classList.remove('hidden');
                        }
                    }
                }
            }
        }

        function showGameOverModal(finalScore, finalTime) {
            const modal = document.getElementById('game-over-modal');
            document.getElementById('final-score').innerText = finalScore;
            document.getElementById('final-time').innerText = formatTime(finalTime);
            modal.classList.add('show');
            showWinEffect();
        }

        function showWinEffect() {
            const canvas = document.getElementById('fireworks'); const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const particles = [], colors = ['#A8B8C2', '#C2B8CC', '#B5C4B1', '#D4BBA5', '#D8D2CB'];

            function createExplosion(x, y) {
                for (let i = 0; i < 60; i++) particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12, life: 1, color: colors[Math.floor(Math.random() * colors.length)] });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.02;
                    ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
                    if (p.life <= 0) particles.splice(i, 1);
                }
                if (particles.length > 0) requestAnimationFrame(animate); else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            createExplosion(canvas.width/2, canvas.height/3); setTimeout(() => createExplosion(canvas.width/3, canvas.height/2), 300); setTimeout(() => createExplosion(canvas.width*2/3, canvas.height/2), 600);
            animate();
        }

        function getFallbackData() {
            return [
                { unit: "展示單元", word: "守株待兔", clue: "比喻拘泥守成，不知變通。", origin: "《韓非子》", sentences: ["不能守株待兔。"], quiz: { question: "農夫得到了什麼？", options: ["肉", "田地荒蕪", "技巧"], correctIndex: 1 } },
                { unit: "展示單元", word: "狐假虎威", clue: "比喻藉著別人的威勢來欺壓人。", origin: "《戰國策》", sentences: ["別狐假虎威。"], quiz: { question: "動物怕誰？", options: ["狐狸", "老虎", "大象"], correctIndex: 1 } },
                { unit: "展示單元", word: "馬到成功", clue: "比喻事情順利。", origin: "無名氏", sentences: ["祝馬到成功。"], quiz: { question: "適合用在？", options: ["祝賀", "跑步", "失敗"], correctIndex: 0 } }
            ];
        }
    </script>
